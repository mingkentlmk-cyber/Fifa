<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA World Cup | 2026年国际足联世界杯</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-primary:#030810;
--bg-secondary:#0a1525;
--bg-tertiary:#0f1f35;
--accent-blue:#00a8ff;
--accent-cyan:#00ffff;
--accent-pink:#ff3366;
--accent-purple:#8b5cf6;
--accent-gold:#ffd700;
--text-primary:#ffffff;
--text-secondary:#8cb4d6;
--text-muted:#5a8ab4;
--glow-blue:0 0 30px rgba(0,168,255,0.5);
--glow-cyan:0 0 40px rgba(0,255,255,0.4);
--glow-pink:0 0 30px rgba(255,51,102,0.5);
--glow-purple:0 0 30px rgba(139,92,246,0.4);
--card-shadow:0 20px 50px rgba(0,0,0,0.6),0 0 40px rgba(0,168,255,0.08);
}
/* === 背景层次升级 - 多层能量光 === */
body{
font-family:'Rajdhani','Noto Sans SC',-apple-system,sans-serif;
background:var(--bg-primary);
color:var(--text-primary);
min-height:100vh;
line-height:1.5;
overflow-x:hidden;
background-image:
radial-gradient(ellipse 120% 90% at 10% -10%, rgba(0,168,255,0.25) 0%, transparent 45%),
radial-gradient(ellipse 100% 70% at 90% 110%, rgba(139,92,246,0.2) 0%, transparent 45%),
radial-gradient(ellipse 70% 50% at 50% 30%, rgba(0,255,255,0.1) 0%, transparent 50%),
radial-gradient(ellipse 50% 30% at 80% 20%, rgba(255,51,102,0.08) 0%, transparent 50%),
radial-gradient(ellipse at top,#0a1a2e 0%, transparent 50%),
radial-gradient(ellipse at bottom,#0d1f35 0%, transparent 50%),
linear-gradient(180deg,#030810 0%,#061525 50%,#030810 100%);
background-attachment:fixed;
}
/* === 顶部导航 === */
.header{
background:linear-gradient(135deg,rgba(10,25,45,0.98) 0%,rgba(6,20,40,0.99) 50%,rgba(10,30,50,0.98) 100%);
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
border-bottom:1px solid rgba(0,168,255,0.3);
box-shadow:0 8px 40px rgba(0,168,255,0.15),inset 0 1px 0 rgba(255,255,255,0.05),0 0 60px rgba(0,168,255,0.08);
backdrop-filter:blur(25px);
flex-wrap:wrap;
gap:8px;
}
.header::after{
content:'';
position:absolute;
bottom:0;
left:0;
right:0;
height:1px;
background:linear-gradient(90deg,transparent,var(--accent-cyan),var(--accent-blue),var(--accent-cyan),transparent);
box-shadow:0 0 20px rgba(0,168,255,0.6);
}
.logo{
font-family:'Orbitron',sans-serif;
font-size:12px;
font-weight:800;
letter-spacing:2px;
text-transform:uppercase;
background:linear-gradient(90deg,#ffffff,var(--accent-cyan),#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
filter:drop-shadow(0 0 15px rgba(0,168,255,0.8));
animation:logoGlow 3s ease-in-out infinite;
}
@keyframes logoGlow{
0%,100%{filter:drop-shadow(0 0 15px rgba(0,168,255,0.8))}
50%{filter:drop-shadow(0 0 25px rgba(0,255,255,1))}
}
.tournament-title{
font-family:'Orbitron',sans-serif;
font-size:14px;
font-weight:600;
letter-spacing:0.5px;
background:linear-gradient(90deg,var(--text-secondary),var(--accent-cyan));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
}
.countdown{display:flex;gap:6px;align-items:center}
.countdown-item{
text-align:center;
background:linear-gradient(180deg,rgba(0,168,255,0.15),rgba(0,102,204,0.1));
padding:8px 12px;
border-radius:10px;
border:1px solid rgba(0,168,255,0.4);
min-width:50px;
position:relative;
overflow:hidden;
box-shadow:0 0 20px rgba(0,168,255,0.2),inset 0 1px 0 rgba(255,255,255,0.1);
}
.countdown-item::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
height:2px;
background:linear-gradient(90deg,transparent,var(--accent-cyan),transparent);
box-shadow:0 0 10px var(--accent-cyan);
}
.countdown-item::after{
content:'';
position:absolute;
bottom:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,rgba(0,168,255,0.3),transparent);
}
.countdown-value{
font-family:'Orbitron',sans-serif;
font-size:18px;
font-weight:700;
line-height:1;
color:var(--accent-cyan);
text-shadow:0 0 20px rgba(0,255,255,0.8);
font-variant-numeric:tabular-nums;
}
.countdown-label{font-size:8px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);margin-top:3px}
.header-right{display:flex;align-items:center}
.header-btn{
background:linear-gradient(135deg,rgba(0,168,255,0.2),rgba(139,92,246,0.15));
border:1px solid rgba(0,168,255,0.6);
color:var(--accent-cyan);
padding:8px 18px;
border-radius:25px;
font-size:10px;
font-weight:700;
cursor:pointer;
transition:all 0.3s ease;
text-transform:uppercase;
letter-spacing:1px;
font-family:'Rajdhani',sans-serif;
box-shadow:0 0 25px rgba(0,168,255,0.3),inset 0 1px 0 rgba(255,255,255,0.1);
}
.header-btn:hover{
background:linear-gradient(135deg,rgba(0,168,255,0.35),rgba(139,92,246,0.25));
box-shadow:0 0 40px rgba(0,168,255,0.5),0 0 60px rgba(0,168,255,0.3);
border-color:var(--accent-cyan);
transform:translateY(-2px);
}
/* === 筛选标签 === */
.sub-header{
background:rgba(10,21,37,0.95);
padding:10px 12px;
display:flex;
gap:8px;
border-bottom:1px solid rgba(0,168,255,0.15);
backdrop-filter:blur(20px);
overflow-x:auto;
position:sticky;
top:60px;
z-index:90;
-webkit-overflow-scrolling:touch;
box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.sub-header::-webkit-scrollbar{display:none}
.filter-tab{
background:none;
border:none;
color:var(--text-muted);
font-size:11px;
font-weight:600;
cursor:pointer;
padding:8px 10px;
position:relative;
transition:all 0.3s ease;
white-space:nowrap;
font-family:'Rajdhani',sans-serif;
text-transform:uppercase;
letter-spacing:0.5px;
display:flex;
flex-direction:column;
align-items:center;
gap:2px;
}
.filter-tab .tab-zh{font-family:'Noto Sans SC',sans-serif;font-size:10px}
.filter-tab .tab-en{font-size:8px;opacity:0.7}
.filter-tab:hover,.filter-tab.active{color:var(--accent-cyan);text-shadow:0 0 15px rgba(0,255,255,0.7)}
.filter-tab.active::before{
content:'';
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:30px;
height:3px;
background:var(--accent-cyan);
border-radius:0 0 50% 50%;
box-shadow:0 0 15px var(--accent-cyan),0 0 30px var(--accent-cyan);
}
.filter-tab.active::after{
content:'';
position:absolute;
bottom:0;left:2px;right:2px;height:2px;
background:linear-gradient(90deg,transparent,var(--accent-cyan),transparent);
box-shadow:0 0 12px var(--accent-cyan);
}
/* === 主容器 === */
.container{max-width:100%;margin:0 auto;padding:16px;position:relative;z-index:1}
/* === 主标题 - 3D金属质感（核心升级） === */
.page-title{
font-family:'Orbitron',sans-serif;
font-size:22px;
font-weight:900;
letter-spacing:5px;
text-transform:uppercase;
margin-bottom:24px;
position:relative;
display:inline-block;
padding-bottom:14px;
background:linear-gradient(180deg,#ffffff 0%,#d0e8ff 20%,#7ecbff 40%,#00a8ff 60%,#004080 85%,#001a33 100%);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
filter:drop-shadow(0 0 20px rgba(0,168,255,0.6));
}
.page-title .title-zh{
display:block;
font-size:0.45em;
letter-spacing:3px;
font-weight:500;
margin-bottom:6px;
background:linear-gradient(180deg,#ffffff 0%,#a0c4e8 50%,#6ba3d6 100%);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.page-title .title_en{
display:block;
font-size:0.38em;
letter-spacing:2px;
opacity:0.8;
font-weight:400;
background:linear-gradient(90deg,var(--accent-cyan),var(--text-secondary));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
/* 标题扫光动画 */
.page-title::before{
content:attr(data-text);
position:absolute;
top:0;
left:0;
width:100%;
background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.95) 45%,rgba(0,255,255,0.6) 50%,transparent 70%);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
animation:metalShine 3s infinite;
overflow:hidden;
}
@keyframes metalShine{
0%{transform:translateX(-120%) skewX(-15deg)}
100%{transform:translateX(120%) skewX(-15deg)}
}
/* 标题厚度感 */
.page-title::after{
content:attr(data-text);
position:absolute;
top:3px;
left:0;
z-index:-1;
color:rgba(0,0,0,0.7);
filter:blur(3px);
text-shadow:none;
}
.page-title::after .title-zh,
.page-title::after .title_en{
-webkit-text-fill-color:transparent;
background:transparent;
}
/* 底部光条 */
.page-title .title-line{
position:absolute;
bottom:0;
left:0;
width:100%;
height:3px;
background:linear-gradient(90deg,var(--accent-cyan),var(--accent-purple),var(--accent-pink),transparent);
box-shadow:0 0 25px rgba(0,168,255,0.6),0 0 50px rgba(139,92,246,0.4);
border-radius:2px;
}
/* === 赛阶段标题 === */
.stage-title{
font-family:'Orbitron',sans-serif;
font-size:16px;
font-weight:700;
letter-spacing:3px;
text-transform:uppercase;
margin:28px 0 16px;
padding-bottom:12px;
border-bottom:1px solid rgba(0,168,255,0.2);
position:relative;
color:#ffffff;
text-shadow:0 0 25px rgba(255,255,255,0.4),0 0 50px rgba(0,168,255,0.3);
display:flex;
align-items:center;
gap:10px;
}
.stage-title .stage-zh{font-family:'Noto Sans SC';font-size:0.9em;background:linear-gradient(90deg,#ffffff,var(--accent-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stage-title .stage_en{font-size:0.75em;opacity:0.7;font-weight:400;background:linear-gradient(90deg,var(--text-secondary),var(--accent-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stage-title::after{
content:'';
position:absolute;
bottom:-1px;
left:0;
width:140px;
height:3px;
background:linear-gradient(90deg,var(--accent-cyan),var(--accent-purple),transparent);
box-shadow:0 0 20px var(--accent-cyan);
border-radius:2px;
}
.stage-title:first-child{margin-top:0}
/* === 分组网格 === */
.groups-grid{display:grid;grid-template-columns:1fr;gap:18px}
/* === 分组卡片 - 游戏UI质感 + 扫描光 === */
.group-card{
background:linear-gradient(145deg, rgba(10,25,48,0.95), rgba(4,12,28,0.98));
border:1px solid rgba(0,168,255,0.25);
border-radius:18px;
overflow:hidden;
position:relative;
backdrop-filter:blur(15px);
box-shadow:0 25px 55px rgba(0,0,0,0.65),0 0 45px rgba(0,168,255,0.1),inset 0 1px 0 rgba(255,255,255,0.08),inset 0 -1px 0 rgba(0,0,0,0.4);
transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
transform:translateY(0);
}
/* 顶部渐变光 */
.group-card::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
height:2px;
background:linear-gradient(90deg,transparent,var(--accent-cyan),var(--accent-purple),var(--accent-cyan),transparent);
box-shadow:0 0 25px rgba(0,168,255,0.7);
}
/* 扫描光效果 - 高级感核心 */
.group-card::after{
content:'';
position:absolute;
top:0;
left:-100%;
width:60%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(0,255,255,0.12),rgba(255,255,255,0.15),transparent);
transform:skewX(-20deg);
animation:scan 4s infinite;
pointer-events:none;
}
@keyframes scan{
0%{left:-100%}
100%{left:150%}
}
.group-card:hover{
transform:translateY(-10px);
border-color:rgba(0,168,255,0.55);
box-shadow:0 35px 70px rgba(0,0,0,0.75),0 0 60px rgba(0,168,255,0.25),0 0 100px rgba(139,92,246,0.18),inset 0 1px 0 rgba(255,255,255,0.12);
}
.group-card:hover::after{
animation:scan 2.5s infinite;
}
/* 内阴影层 */
.group-card .card-inner{
position:relative;
background:linear-gradient(180deg,rgba(0,168,255,0.02) 0%,transparent 30%,transparent 70%,rgba(0,0,0,0.15) 100%);
}
/* 分组标题 */
.group-header{
background:linear-gradient(180deg,rgba(0,168,255,0.12),rgba(0,102,204,0.05));
padding:14px 18px;
border-bottom:1px solid rgba(0,168,255,0.12);
position:relative;
}
.group-header::after{
content:'';
position:absolute;
bottom:0;
left:0;
right:0;
height:1px;
background:linear-gradient(90deg,transparent,rgba(0,255,255,0.5),transparent);
}
.group-title{
font-family:'Orbitron',sans-serif;
font-size:12px;
font-weight:700;
letter-spacing:4px;
text-transform:uppercase;
color:var(--accent-cyan);
text-shadow:0 0 25px rgba(0,255,255,0.7),0 0 50px rgba(0,168,255,0.4);
}
.group-title .group-zh{font-family:'Noto Sans SC';font-size:0.9em}
.group-title .group_en{font-size:0.8em;opacity:0.7;font-weight:400}
.match-list{padding:10px}
/* === 比赛项 - 独立卡片感 + 扫描光 === */
.match-item{
padding:16px 18px;
margin-bottom:10px;
border-radius:14px;
position:relative;
transition:all 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
background:linear-gradient(145deg, rgba(14,32,55,0.6), rgba(6,16,35,0.8));
box-shadow:0 12px 30px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.06),inset 0 -1px 0 rgba(0,0,0,0.2);
border:1px solid rgba(0,168,255,0.1);
overflow:hidden;
}
/* 扫描光 */
.match-item::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:55%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(0,255,255,0.1),rgba(255,255,255,0.12),transparent);
transform:skewX(-18deg);
animation:scanItem 4.5s infinite;
pointer-events:none;
}
@keyframes scanItem{
0%{left:-100%}
100%{left:150%}
}
.match-item:last-child{margin-bottom:0}
.match-item:hover{
background:linear-gradient(145deg, rgba(18,42,68,0.7), rgba(10,25,50,0.85));
transform:translateY(-5px);
border-color:rgba(0,168,255,0.35);
box-shadow:0 20px 40px rgba(0,0,0,0.6),0 0 35px rgba(0,168,255,0.18),inset 0 1px 0 rgba(255,255,255,0.1);
}
.match-item:hover::before{animation:scanItem 2.5s infinite}
/* === 时间信息 - 强化发光 === */
.match-datetime{
font-family:'Orbitron',sans-serif;
font-size:13px;
font-weight:600;
color:var(--accent-cyan);
margin-bottom:14px;
letter-spacing:2px;
text-align:center;
display:block;
text-shadow:0 0 20px rgba(0,255,255,0.8),0 0 40px rgba(0,168,255,0.5),0 0 60px rgba(0,168,255,0.3);
padding:8px 0;
border-bottom:1px solid rgba(0,168,255,0.18);
position:relative;
}
.match-datetime::before{content:'◆';margin-right:10px;opacity:0.6;font-size:8px}
.match-datetime::after{content:'◆';margin-left:10px;opacity:0.6;font-size:8px}
/* === 球队区域 === */
.match-teams{display:flex;align-items:center;justify-content:space-between;position:relative}
.team{display:flex;align-items:center;gap:12px;flex:1;position:relative}
.team.team-home{justify-content:flex-start}
.team.team-away{justify-content:flex-end}
/* === 国旗3D强化 - 核心视觉点 === */
.team-flag{
width:48px;
height:32px;
border-radius:6px;
object-fit:cover;
flex-shrink:0;
box-shadow:0 10px 25px rgba(0,0,0,0.75),0 0 30px rgba(0,168,255,0.2),inset 0 3px 8px rgba(255,255,255,0.3),inset 0 -3px 8px rgba(0,0,0,0.35);
transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
position:relative;
transform:perspective(550px) rotateY(-18deg);
}
.team-flag::before{
content:'';
position:absolute;
top:0;left:0;right:0;bottom:0;
border-radius:6px;
background:linear-gradient(135deg,rgba(255,255,255,0.35) 0%,rgba(255,255,255,0.12) 25%,transparent 50%,rgba(0,0,0,0.25) 100%);
pointer-events:none;
z-index:2;
}
.team-flag::after{
content:'';
position:absolute;
top:3px;
left:10%;
right:10%;
height:38%;
border-radius:6px 6px 50% 50%;
background:linear-gradient(180deg,rgba(255,255,255,0.4) 0%,transparent 100%);
pointer-events:none;
z-index:3;
}
.team-away .team-flag{transform:perspective(550px) rotateY(18deg)}
.team-flag:hover{
transform:perspective(550px) rotateY(0deg) scale(1.22) translateY(-3px);
box-shadow:0 15px 35px rgba(0,0,0,0.7),0 0 45px rgba(0,168,255,0.4),0 0 65px rgba(139,92,246,0.25),inset 0 3px 10px rgba(255,255,255,0.35),inset 0 -3px 10px rgba(0,0,0,0.3);
}
.team-name-wrapper{flex:1;display:flex;flex-direction:column;align-items:center;min-width:0}
.team-name-zh{
font-family:'Rajdhani','Noto Sans SC',sans-serif;
font-size:14px;
font-weight:700;
text-align:center;
color:#ffffff;
text-shadow:0 2px 10px rgba(0,0,0,0.9),0 0 25px rgba(0,168,255,0.35);
line-height:1.35;
}
.team-name-en{font-size:9px;color:var(--text-muted);text-align:center;letter-spacing:0.3px;margin-top:3px}
/* === VS视觉中心 - 双层光强化 === */
.match-vs{
font-family:'Orbitron',sans-serif;
font-size:13px;
font-weight:800;
color:var(--accent-pink);
padding:0 12px;
letter-spacing:3px;
flex-shrink:0;
text-shadow:0 0 12px rgba(255,50,100,1),0 0 30px rgba(255,50,100,0.7),0 0 50px rgba(255,50,100,0.4);
position:relative;
}
/* 双层光圈 */
.match-vs::before{
content:'';
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:90px;
height:90px;
background:radial-gradient(circle,rgba(255,51,102,0.3) 0%,rgba(255,51,102,0.1) 35%,transparent 65%),
radial-gradient(circle,rgba(0,168,255,0.2) 0%,rgba(0,168,255,0.08) 40%,transparent 70%);
border-radius:50%;
z-index:-1;
animation:vsPulse 2s ease-in-out infinite;
}
@keyframes vsPulse{
0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.9}
50%{transform:translate(-50%,-50%) scale(1.5);opacity:0.5}
}
/* === 淘汰赛区域 === */
.knockout-matches{display:flex;flex-direction:column;gap:14px}
/* === 淘汰赛卡片 === */
.knockout-card{
background:linear-gradient(145deg, rgba(10,25,48,0.95), rgba(4,12,28,0.98));
border:1px solid rgba(0,168,255,0.22);
border-radius:16px;
padding:16px 18px;
display:flex;
align-items:center;
gap:14px;
transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
position:relative;
backdrop-filter:blur(15px);
box-shadow:0 18px 45px rgba(0,0,0,0.55),0 0 35px rgba(0,168,255,0.08),inset 0 1px 0 rgba(255,255,255,0.06);
overflow:hidden;
}
/* 顶部光 */
.knockout-card::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
height:2px;
background:linear-gradient(90deg,transparent,var(--accent-cyan),var(--accent-purple),transparent);
box-shadow:0 0 20px rgba(0,168,255,0.6);
}
/* 扫描光 */
.knockout-card::after{
content:'';
position:absolute;
top:0;left:-100%;width:55%;height:100%;
background:linear-gradient(120deg,transparent,rgba(0,255,255,0.1),rgba(255,255,255,0.12),transparent);
transform:skewX(-18deg);

function getTeamName(teamKey){const team=teams[teamKey];if(!team)return{zh:teamKey,en:teamKey};return{zh:team.nameZh,en:teamKey}}
function renderGroups(){const container=document.getElementById('groups-container');let html='';Object.keys(groups).forEach(groupLetter=>{const groupMatchesFiltered=groupMatches.filter(m=>m.group===groupLetter);html+=`<div class="group-card" data-stage="group"><div class="group-header"><div class="group-title"><span class="group-zh">分组 ${groupLetter}</span><span class="group_en">Group ${groupLetter}</span></div></div><div class="match-list">${groupMatchesFiltered.map(match=>`<div class="match-item" data-stage="group"><div class="match-datetime">${match.date} · ${formatTimeWithAmPm(match.time)}</div><div class="match-teams"><div class="team team-home"><img src="${getFlag(teams[match.team1]?.code||'xx')}" class="team-flag" alt="${match.team1}"><div class="team-name-wrapper"><span class="team-name-zh">${getTeamName(match.team1).zh}</span><span class="team-name-en">${getTeamName(match.team1).en}</span></div></div><span class="match-vs">VS</span><div class="team team-away"><div class="team-name-wrapper"><span class="team-name-zh">${getTeamName(match.team2).zh}</span><span class="team-name-en">${getTeamName(match.team2).en}</span></div><img src="${getFlag(teams[match.team2]?.code||'xx')}" class="team-flag" alt="${match.team2}"></div></div></div>`).join('')}</div></div>`});container.innerHTML=html}
function renderKnockout(){const container=document.getElementById('knockout-container');let html='';knockoutMatches.forEach(match=>{const isFinal=match.stage==='final';html+=`<div class="knockout-card ${isFinal?'final-card':''}" data-stage="${match.stage}"><div class="knockout-datetime"><div class="knockout-date">${match.date}</div><div class="knockout-time">${formatTimeWithAmPm(match.time)}</div></div><div class="knockout-teams"><div class="knockout-team team-left"><img src="${getFlag(teams[match.team1]?.code||'xx')}" class="team-flag" alt="${match.team1}" onerror="this.style.display='none'"><div class="knockout-team-name-wrapper"><span class="team-name-zh">${getTeamName(match.team1).zh}</span><span class="team-name-en">${getTeamName(match.team1).en}</span></div></div><span class="knockout-vs">VS</span><div class="knockout-team team-right"><div class="knockout-team-name-wrapper"><span class="team-name-zh">${getTeamName(match.team2).zh}</span><span class="team-name-en">${getTeamName(match.team2).en}</span></div><img src="${getFlag(teams[match.team2]?.code||'xx')}" class="team-flag" alt="${match.team2}" onerror="this.style.display='none'"></div></div><div class="knockout-stadium"><div class="knockout-stadium-name">TBD</div><div class="knockout-stadium-city">USA/Canada/Mexico</div></div></div>`});container.innerHTML=html}
function filterByStage(stage,btn){document.querySelectorAll('.filter-tab').forEach(tab=>tab.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.group-card').forEach(card=>card.style.display=(stage==='all'||stage==='group')?'block':'none');document.querySelectorAll('.knockout-card').forEach(card=>{if(stage==='all')card.style.display='flex';else if(stage==='group')card.style.display='none';else card.style.display=card.dataset.stage===stage?'flex':'none'});const groupTitle=document.getElementById('group-stage');groupTitle.style.display=(stage==='all'||stage==='group')?'block':'none'}
function scrollToSchedule(){document.querySelector('.container').scrollIntoView({behavior:'smooth'})}
renderGroups();renderKnockout();
</script>
</body>
</html>
