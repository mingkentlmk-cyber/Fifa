/* =========================================================
   PATCH: clean FIFA title + original flag shape 3D mirror
   - No schedule/data/filter logic changed
   - Fix header title rendering artifacts
   - Keep flags rectangular, add 3D bevel + sliding reflection
========================================================= */

/* Cleaner header logo: remove broken stencil-like artifact from Orbitron rendering */
.logo{
  font-family:'Rajdhani','Noto Sans SC',system-ui,sans-serif !important;
  font-size:22px !important;
  font-weight:900 !important;
  letter-spacing:2.2px !important;
  line-height:1 !important;
  text-transform:uppercase !important;
  color:#f2fbff !important;
  background:none !important;
  -webkit-background-clip:initial !important;
  -webkit-text-fill-color:#f2fbff !important;
  text-shadow:
    0 1px 0 #ffffff,
    0 2px 0 #9bb9d0,
    0 3px 0 #35526b,
    0 5px 0 #071827,
    0 0 12px rgba(112,224,255,.75),
    0 0 26px rgba(0,141,255,.46) !important;
  filter:drop-shadow(0 8px 10px rgba(0,0,0,.55)) !important;
}

/* Flag frame keeps original rectangle, adds premium thickness and moving glass highlight */
.flag-frame{
  position:relative;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:42px;
  height:30px;
  flex-shrink:0;
  border-radius:3px;
  padding:2px;
  overflow:hidden;
  transform:perspective(420px) rotateX(5deg) rotateY(-4deg) translateZ(0);
  transform-style:preserve-3d;
  background:
    linear-gradient(145deg,rgba(255,255,255,.96) 0%,rgba(127,172,202,.9) 18%,rgba(20,46,76,.92) 42%,rgba(231,248,255,.92) 56%,rgba(62,101,135,.95) 76%,rgba(255,255,255,.85) 100%);
  border:1px solid rgba(219,245,255,.9);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.9),
    inset 0 -3px 7px rgba(0,0,0,.48),
    0 0 0 1px rgba(2,16,31,.95),
    0 0 0 2px rgba(77,205,255,.28),
    0 7px 13px rgba(0,0,0,.55),
    0 0 16px rgba(66,202,255,.24);
  animation:flag3dFloat 5.2s ease-in-out infinite;
}

.flag-frame::before{
  content:"";
  position:absolute;
  inset:2px;
  z-index:2;
  pointer-events:none;
  border-radius:2px;
  background:
    linear-gradient(180deg,rgba(255,255,255,.28),rgba(255,255,255,.03) 35%,rgba(0,0,0,.18) 100%),
    radial-gradient(circle at 25% 8%,rgba(255,255,255,.42),transparent 28%);
  mix-blend-mode:screen;
}

.flag-frame::after{
  content:"";
  position:absolute;
  top:-38%;
  left:-95%;
  width:70%;
  height:180%;
  z-index:3;
  pointer-events:none;
  background:linear-gradient(110deg,
    transparent 0%,
    rgba(255,255,255,.05) 22%,
    rgba(255,255,255,.68) 45%,
    rgba(127,235,255,.34) 52%,
    rgba(255,255,255,.12) 64%,
    transparent 100%);
  transform:skewX(-18deg);
  mix-blend-mode:screen;
  animation:flagMirrorSlide 3.9s ease-in-out infinite;
}

.team-flag{
  width:100% !important;
  height:100% !important;
  padding:0 !important;
  object-fit:cover !important;
  border-radius:1px !important;
  border:none !important;
  background:#0b1a2c !important;
  box-shadow:
    inset 0 1px 2px rgba(255,255,255,.38),
    inset 0 -4px 8px rgba(0,0,0,.36) !important;
  filter:saturate(1.18) contrast(1.12) brightness(1.04);
  transform:translateZ(8px);
}

.match-item:hover .flag-frame{
  transform:perspective(420px) rotateX(2deg) rotateY(5deg) translateY(-1px) translateZ(3px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.95),
    inset 0 -3px 7px rgba(0,0,0,.48),
    0 0 0 1px rgba(2,16,31,.95),
    0 0 0 2px rgba(103,231,255,.46),
    0 10px 18px rgba(0,0,0,.58),
    0 0 24px rgba(92,233,255,.42);
}

@keyframes flagMirrorSlide{
  0%{ left:-105%; opacity:.05; }
  18%{ opacity:.78; }
  42%{ left:132%; opacity:.5; }
  100%{ left:132%; opacity:.06; }
}

@keyframes flag3dFloat{
  0%,100%{ transform:perspective(420px) rotateX(5deg) rotateY(-4deg) translateZ(0); }
  50%{ transform:perspective(420px) rotateX(2deg) rotateY(4deg) translateZ(2px); }
}

/* TBD is not a real flag; keep it simple */
div.team-flag{
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  padding:0 !important;
  border:1px solid rgba(84,218,255,.35) !important;
  border-radius:2px !important;
  box-shadow:inset 0 0 10px rgba(0,168,255,.12) !important;
}

/* Desktop polish */
@media (min-width:768px){
  .logo{
    font-size:34px !important;
    letter-spacing:3px !important;
  }
  .flag-frame{
    width:52px;
    height:36px;
  }
}

/* Export keeps the same flag 3D frame */
.export-card .flag-frame{
  width:52px;
  height:36px;
}

</style>

 function formatTimeWithAmPm(time){
 const [hours, minutes] = time.split(':');
 const h = parseInt(hours);
 const ampm = h >= 12 ? 'PM' : 'AM';
 const h12 = h % 12 || 12;
 return `${h12}:${minutes} ${ampm}`;
 }
 function updateCountdown(){

 const diff = targetDate - now;

 const days = Math.floor(diff/(1000*60*60*24));
 const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
 const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
 const seconds = Math.floor((diff%(1000*60))/1000);
 document.getElementById('days').textContent = String(days).padStart(2,'0');
 document.getElementById('hours').textContent = String(hours).padStart(2,'0');
 document.getElementById('minutes').textContent = String(minutes).padStart(2,'0');
 document.getElementById('seconds').textContent = String(seconds).padStart(2,'0');
 }
 }
