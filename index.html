function formatTimeWithAmPm(time){const[hours,minutes]=time.split(':');const h=parseInt(hours);const ampm=h>=12?'PM':'AM';const h12=h%12||12;return`${h12}:${minutes} ${ampm}`}
function updateCountdown(){const targetDate=new Date('2026-06-12T03:00:00');const now=new Date();const diff=targetDate-now;if(diff>0){const days=Math.floor(diff/(1000*60*60*24));const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));const minutes=Math.floor((diff%(1000*60*60))/(1000*60));const seconds=Math.floor((diff%(1000*60))/1000);document.getElementById('days').textContent=String(days).padStart(3,'0');document.getElementById('hours').textContent=String(hours).padStart(2,'0');document.getElementById('minutes').textContent=String(minutes).padStart(2,'0');document.getElementById('seconds').textContent=String(seconds).padStart(2,'0')}}
