.team-away .team-flag{transform:perspective(500px) rotateY(10deg);}
.team-flag:hover{transform:perspective(500px) rotateY(0deg) scale(1.1);box-shadow:0 8px 15px rgba(0,0,0,0.6),0 0 20px rgba(0,168,255,0.3);}

.final-card::before{background:linear-gradient(90deg,transparent,rgba(139,92,246,0.8),var(--accent-cyan),rgba(139,92,246,0.8),transparent);box-shadow:0 0 25px rgba(139,92,246,0.6);}

@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.group-card,.knockout-card,.match-card{animation:fadeIn 0.5s ease forwards;opacity:0}
.group-card:nth-child(1){animation-delay:0.04s}.group-card:nth-child(2){animation-delay:0.08s}.group-card:nth-child(3){animation-delay:0.12s}.group-card:nth-child(4){animation-delay:0.16s}.group-card:nth-child(5){animation-delay:0.2s}.group-card:nth-child(6){animation-delay:0.24s}.group-card:nth-child(7){animation-delay:0.28s}.group-card:nth-child(8){animation-delay:0.32s}.group-card:nth-child(9){animation-delay:0.36s}.group-card:nth-child(10){animation-delay:0.4s}.group-card:nth-child(11){animation-delay:0.44s}.group-card:nth-child(12){animation-delay:0.48s}

function formatTimeWithAmPm(time){
const cleanTime = time.replace(/\s*(AM|PM)\s*/gi, '').trim();
const [hours, minutes] = cleanTime.split(':');
const h = parseInt(hours);
const ampm = h >= 12 ? 'PM' : 'AM';
const h12 = h % 12 || 12;
return `${h12}:${minutes} ${ampm}`;
}
function updateCountdown(){
const targetDate=new Date('2026-06-12T03:00:00');
const now=new Date();
const diff=targetDate-now;
if(diff>0){
const days=Math.floor(diff/(1000*60*60*24));
const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((diff%(1000*60*60))/(1000*60));
const seconds=Math.floor((diff%(1000*60))/1000);
document.getElementById('days').textContent=String(days).padStart(2,'0');
document.getElementById('hours').textContent=String(hours).padStart(2,'0');
document.getElementById('minutes').textContent=String(minutes).padStart(2,'0');
document.getElementById('seconds').textContent=String(seconds).padStart(2,'0');
}
}
setInterval(updateCountdown,1000);

function getTeamName(teamKey){
const team=teams[teamKey];
if(!team)return{zh:'TBD',en:teamKey};

}
function isCountry(key){return!!teams[key]}
function formatTeamEnName(name){
if(name==='Bosnia and Herzegovina'){return'Bosnia and<br>Herzegovina';}
return name;
}
function createCardHTML(titleText,matchesData,stageType,cardId,isByDay=false){
let matchesHtml=matchesData.map(match=>{
const team1=getTeamName(match.team1);
const team2=getTeamName(match.team2);
const isTeam1Country=isCountry(match.team1);
const isTeam2Country=isCountry(match.team2);
return`<div class="match-item" data-stage="${stageType}"><div class="match-datetime"><div class="match-datetime-date">${match.date}</div><div class="match-datetime-time">${formatTimeWithAmPm(match.time)}</div></div><div class="match-teams"><div class="team team-home">${isTeam1Country?`<img src="${getFlag(teams[match.team1]?.code||'xx')}" class="team-flag" alt="${match.team1}" crossorigin="anonymous">`:`<div class="team-flag" style="display:flex;align-items:center;justify-content:center;background:rgba(0,168,255,0.1);border:1px solid rgba(0,168,255,0.3);">TBD</div>`}<div class="team-name-wrapper"><span class="team-name-zh">${team1.zh}</span><span class="team-name-en">${formatTeamEnName(team1.en)}</span></div></div><span class="match-vs">VS</span><div class="team team-away"><div class="team-name-wrapper"><span class="team-name-zh">${team2.zh}</span><span class="team-name-en">${formatTeamEnName(team2.en)}</span></div>${isTeam2Country?`<img src="${getFlag(teams[match.team2]?.code||'xx')}" class="team-flag" alt="${match.team2}" crossorigin="anonymous">`:`<div class="team-flag" style="display:flex;align-items:center;justify-content:center;background:rgba(0,168,255,0.1);border:1px solid rgba(0,168,255,0.3);">TBD</div>`}</div></div></div>`}).join('');
const byDayClass = isByDay ? 'by-day' : '';
return`<div class="group-card ${byDayClass}" data-stage="${stageType}" id="${cardId}"><div class="group-header"><div class="group-title"><span class="group_en">${titleText}</span></div></div><div class="match-list">${matchesHtml}</div></div>`;
}
function renderGroups(){
const container=document.getElementById('groups-container');
let html='';
Object.keys(groups).forEach(groupLetter=>{
const groupMatchesFiltered=groupMatches.filter(m=>m.group===groupLetter);
html+=createCardHTML(`Group ${groupLetter}`,groupMatchesFiltered,'group',`group-card-${groupLetter}`,false);
});
container.innerHTML=html;
}
function renderGroupsByDay(){
const container=document.getElementById('groups-container');
let html='';
const groupByDate = {};
groupMatches.forEach(match => {
if(!groupByDate[match.date]) groupByDate[match.date] = [];
groupByDate[match.date].push(match);
});
Object.keys(groupByDate).sort().forEach(date => {
html += createCardHTML(date, groupByDate[date], 'group', `group-by-day-${date}`, true);
});
container.innerHTML += html;
}
function renderKnockout(){
const container=document.getElementById('knockout-container');
let html='';
const round32Matches = knockoutMatches.filter(m => m.stage === 'round32');
const round32ByDate = {};
round32Matches.forEach(match => {
if(!round32ByDate[match.date]) round32ByDate[match.date] = [];
round32ByDate[match.date].push(match);
});
Object.keys(round32ByDate).sort().forEach(date => {
html += createCardHTML(date, round32ByDate[date], 'round32', `round32-${date}`, false);
});
const round16Matches = knockoutMatches.filter(m => m.stage === 'round16');
const round16ByDate = {};
round16Matches.forEach(match => {
if(!round16ByDate[match.date]) round16ByDate[match.date] = [];
round16ByDate[match.date].push(match);
});
Object.keys(round16ByDate).sort().forEach(date => {
html += createCardHTML(date, round16ByDate[date], 'round16', `round16-${date}`, false);
});
const quarterfinalMatches = knockoutMatches.filter(m => m.stage === 'quarterfinal');
if(quarterfinalMatches.length > 0){
html += createCardHTML('Quarter-finals', quarterfinalMatches, 'quarterfinal', 'quarterfinal', false);
}
const semifinalMatches = knockoutMatches.filter(m => m.stage === 'semifinal');
semifinalMatches.forEach((match, index) => {
html += createCardHTML(`Semi-final ${index + 1}`, [match], 'semifinal', `semifinal-${index + 1}`, false);
});
const thirdMatches = knockoutMatches.filter(m => m.stage === 'third');
if(thirdMatches.length > 0){
html += createCardHTML('Third Place', thirdMatches, 'third', 'third-place', false);
}
const finalMatches = knockoutMatches.filter(m => m.stage === 'final');
if(finalMatches.length > 0){
html += createCardHTML('Final', finalMatches, 'final', 'final', false);
}
container.innerHTML = html;
}
function filterByStage(stage,btn){
document.querySelectorAll('.filter-tab').forEach(tab=>tab.classList.remove('active'));
btn.classList.add('active');
const allCards = document.querySelectorAll('.group-card');
const groupTitle = document.getElementById('group-stage');
if(stage === 'all'){
allCards.forEach(card => card.style.display = 'block');
groupTitle.style.display = 'block';
document.querySelectorAll('.group-card:not(.by-day)').forEach(card => card.style.display = 'none');
document.querySelectorAll('.group-card.by-day').forEach(card => card.style.display = 'block');
}else if(stage === 'group'){
allCards.forEach(card => card.style.display = 'none');
document.querySelectorAll('.group-card[data-stage="group"]:not(.by-day)').forEach(card => card.style.display = 'block');
groupTitle.style.display = 'block';
}else{
allCards.forEach(card => card.style.display = 'none');
document.querySelectorAll(`.group-card[data-stage="${stage}"]`).forEach(card => card.style.display = 'block');
groupTitle.style.display = (stage === 'group') ? 'block' : 'none';
}
}
renderGroups();
renderGroupsByDay();
renderKnockout();
document.querySelectorAll('.group-card:not(.by-day)').forEach(card => card.style.display = 'none');
